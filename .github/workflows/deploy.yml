name: Deploy Angular with ngh

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Angular
        run: npm run build -- --base-href "/Jareth.dev/"

      - name: Deploy with ngh
        run: npx ngh --dir=dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
